# ==============================================================================
# jneopallium — Autonomous AI Brain Configuration
# Model: autonomousAI-v1  |  DOI: SR24703042047
# ==============================================================================

# --- Thread / pool settings ---------------------------------------------------
neuron.pool.size=14
worker.threads.amount=4

# --- Execution control --------------------------------------------------------
configuration.maxRun=100
configuration.infiniteRun=false

# --- Input source (fileSystem | kafka | redis | inMemory) ---------------------
configuration.input.type=fileSystem
configuration.input.path=model/autonomousAI/input
configuration.input.layermeta=model/autonomousAI/

# --- File system class for I/O ------------------------------------------------
configuration.filesystem.class=com.rakovpublic.jneuropallium.worker.net.layers.impl.file.FileLayersMeta
configuration.filesystem.constructor.args=empty
configuration.filesystem.constructor.args.types=empty

# --- Learning / plasticity ----------------------------------------------------
configuration.isteacherstudying=false
configuration.studyingalgo=

# --- Fast / slow loop timing --------------------------------------------------
# fast loop runs every cycle; slow loop runs every 5 fast cycles
configuration.slowfast.ratio=5
configuration.history.slow.runs=10
configuration.history.fast.runs=1

# --- Signal processing frequency map ------------------------------------------
# fast signals: epoch=1, loop=1  |  slow signals: epoch=1, loop=5 or 10
